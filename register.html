<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - EduLance</title>
  <link rel="stylesheet" href="/src/common.css">
</head>
<body>
  <nav id="navbar" class="bg-slate-800/50 backdrop-blur-md sticky top-0 z-50"></nav>
  
  <main class="container mx-auto px-4 py-20 flex justify-center">
    <div class="card max-w-lg w-full">
      <h2 class="text-3xl font-bold mb-6 text-center">Create Your Account</h2>
      
      <div id="error-message" class="hidden bg-red-500/20 border border-red-500 text-red-200 p-3 rounded-lg mb-4 text-sm"></div>
      <div id="info-message" class="hidden bg-blue-500/20 border border-blue-500 text-blue-200 p-3 rounded-lg mb-4 text-sm"></div>

      <form id="registerForm" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Full Name</label>
            <input type="text" id="name" class="input-field" required>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Email Address</label>
            <input type="email" id="email" class="input-field" required>
          </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Password</label>
            <input type="password" id="password" class="input-field" required minlength="6">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Role</label>
            <select id="role" class="input-field" required>
              <option value="freelancer">Freelancer (Student)</option>
              <option value="client">Client (Post Projects)</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Verification Folder Link (Required)</label>
          <input type="url" id="verificationFolderLink" class="input-field" placeholder="https://drive.google.com/..." required>
          <p class="text-xs text-slate-400 mt-1">Provide a link to your student ID and other verification documents.</p>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Portfolio / GitHub Link (Optional)</label>
          <input type="url" id="portfolioLink" class="input-field" placeholder="https://github.com/yourusername">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Resume Link (Optional)</label>
          <input type="url" id="resumeLink" class="input-field" placeholder="https://linkedin.com/in/...">
        </div>

        <button type="submit" id="submitBtn" class="btn-primary w-full">Register</button>
      </form>
      
      <p class="mt-6 text-center text-slate-400">
        Already have an account? <a href="/login.html" class="text-blue-400 hover:underline">Login here</a>
      </p>
    </div>
  </main>

  <script type="module" src="/src/register.js"></script>
</body>
</html>
