<!DOCTYPE html>
<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - EduLance</title>
  <link rel="stylesheet" href="./src/common.css">
</head>
<body>
  <nav id="navbar" class="bg-slate-800/50 backdrop-blur-md sticky top-0 z-50"></nav>
  
  <main class="container mx-auto px-4 py-10">
    <h2 class="text-3xl font-bold mb-8">Admin Dashboard - Pending Verifications</h2>

  <script type="module" src="./src/admin.js"></script>
